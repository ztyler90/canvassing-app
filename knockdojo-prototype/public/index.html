<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KnockDojo — Prototype</title>
<style>
  :root { --bg:#0e1116; --panel:#171b22; --line:#262c36; --text:#e8eaed; --muted:#9aa3af; --accent:#ff5a3c; --rep:#2563eb; --home:#2f3744; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
  header { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  header b { font-size:17px; } header .tag { color:var(--muted); font-size:13px; }
  .wrap { max-width:760px; margin:0 auto; padding:16px; }
  .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  select, button, input { font:inherit; }
  select { background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:9px 14px; cursor:pointer; font-weight:600; }
  button.secondary { background:var(--panel); color:var(--text); border:1px solid var(--line); }
  button:disabled { opacity:.5; cursor:default; }
  #chat { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; min-height:320px; }
  .msg { margin:10px 0; display:flex; }
  .msg .bubble { padding:9px 12px; border-radius:12px; max-width:80%; white-space:pre-wrap; }
  .msg.rep { justify-content:flex-end; } .msg.rep .bubble { background:var(--rep); }
  .msg.home .bubble { background:var(--home); }
  .meta { font-size:11px; color:var(--muted); margin-top:3px; }
  .composer { display:flex; gap:8px; margin-top:12px; }
  .composer input { flex:1; background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:11px 12px; }
  .score { margin-top:16px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .scoreTop { display:flex; align-items:baseline; gap:14px; }
  .bignum { font-size:54px; font-weight:800; color:var(--accent); line-height:1; }
  .verdict { color:var(--text); font-weight:600; }
  .bar { height:8px; background:var(--line); border-radius:6px; overflow:hidden; margin:4px 0 2px; }
  .bar > span { display:block; height:100%; background:var(--accent); }
  .dim { margin:10px 0; } .dim .lab { display:flex; justify-content:space-between; font-size:13px; color:var(--muted); }
  .coach { border-top:1px solid var(--line); margin-top:12px; padding-top:12px; }
  .coach .q { color:var(--muted); font-style:italic; } .coach .fix { color:#7ee0a8; }
  .hint { color:var(--muted); font-size:13px; }
  .err { color:#ff8a7a; font-size:13px; margin-top:8px; }
</style>
</head>
<body>
<header><b>🥋 KnockDojo</b> <span class="tag">Phase 0 prototype — text-first role-play</span></header>
<div class="wrap">
  <div class="controls">
    <label class="hint">Homeowner:</label>
    <select id="persona"></select>
    <button id="start" class="secondary">Knock 🚪</button>
    <button id="end" class="secondary" disabled>End &amp; Score</button>
  </div>

  <div id="chat"><div class="hint">Pick a homeowner and hit <b>Knock</b> to begin. You're the rep — type your pitch.</div></div>

  <div class="composer">
    <input id="input" placeholder="Type what you'd say at the door…" disabled autocomplete="off" />
    <button id="send" disabled>Send</button>
  </div>

  <div id="scoreBox"></div>
  <div id="err" class="err"></div>
</div>

<script>
let history = [];      // [{role:'user'|'assistant', content}]
let personaId = null;
let started = false;

const $ = (id) => document.getElementById(id);
const chat = $("chat");

async function loadPersonas() {
  const ps = await (await fetch("/api/personas")).json();
  $("persona").innerHTML = ps.map(p => `<option value="${p.id}">${p.name} — ${p.vertical} (d${p.difficulty})</option>`).join("");
}
loadPersonas();

function addMsg(role, text, meta) {
  const div = document.createElement("div");
  div.className = "msg " + (role === "user" ? "rep" : "home");
  div.innerHTML = `<div><div class="bubble"></div>${meta ? `<div class="meta">${meta}</div>` : ""}</div>`;
  div.querySelector(".bubble").textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

$("start").onclick = async () => {
  personaId = $("persona").value;
  history = []; started = true;
  chat.innerHTML = ""; $("scoreBox").innerHTML = ""; $("err").textContent = "";
  $("input").disabled = false; $("send").disabled = false; $("end").disabled = false;
  $("input").focus();
  // Homeowner opens the door first.
  await turn(null);
};

async function turn(repText) {
  try {
    if (repText) { history.push({ role: "user", content: repText }); addMsg("user", repText); }
    $("send").disabled = true;
    const r = await fetch("/api/chat", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ personaId, history }) });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    history.push({ role: "assistant", content: data.reply });
    addMsg("assistant", data.reply, `↩ ${data.latency_ms}ms · ~$${data.cost_usd}`);
  } catch (e) { $("err").textContent = e.message; }
  finally { $("send").disabled = false; }
}

$("send").onclick = () => {
  const v = $("input").value.trim();
  if (!v || !started) return;
  $("input").value = "";
  turn(v);
};
$("input").addEventListener("keydown", (e) => { if (e.key === "Enter") $("send").click(); });

$("end").onclick = async () => {
  if (!history.length) return;
  $("end").disabled = true; $("err").textContent = "";
  $("scoreBox").innerHTML = `<div class="hint">Scoring your pitch…</div>`;
  try {
    const outcome = prompt("Outcome? booked / soft_yes / callback / door_closed", "callback") || "callback";
    const r = await fetch("/api/score", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ personaId, history, outcome }) });
    const s = await r.json();
    if (s.error) throw new Error(s.error);
    renderScore(s);
  } catch (e) { $("scoreBox").innerHTML = ""; $("err").textContent = e.message; }
  finally { $("end").disabled = false; }
};

function dimRow(label, obj) {
  const sc = obj?.score ?? 0;
  return `<div class="dim"><div class="lab"><span>${label}</span><span>${sc}</span></div>
    <div class="bar"><span style="width:${sc}%"></span></div>
    <div class="hint">${obj?.reason || ""}</div></div>`;
}

function renderScore(s) {
  const d = s.dimensions || {};
  const coach = (s.coaching || []).map(c =>
    `<div style="margin:8px 0"><div class="q">"${c.quote}"</div><div>${c.issue}</div><div class="fix">→ ${c.fix}</div></div>`).join("");
  $("scoreBox").innerHTML = `
    <div class="score">
      <div class="scoreTop"><div class="bignum">${s.total}</div><div class="verdict">${s.verdict || ""}</div></div>
      ${dimRow("Open", d.open)}
      ${dimRow("Discovery", d.discovery)}
      ${dimRow("Objection handling", d.objection)}
      ${dimRow("Value &amp; urgency", d.value_urgency)}
      ${dimRow("Close", d.close)}
      <div class="coach"><b>Coaching</b>${coach}
        <div style="margin-top:8px"><b>Try next:</b> ${s.try_next || ""}</div>
        <div class="hint" style="margin-top:6px">${s.outcome_note || ""} · scored in ${s.latency_ms}ms · ~$${s.cost_usd}</div>
      </div>
    </div>`;
}
</script>
</body>
</html>
