# Supabase project configuration
# Reference: https://supabase.com/docs/guides/local-development/cli/config

[project]
id = "knockiq"   # update to match your actual Supabase project ref

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://canvassing-app-theta.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

# Branded transactional auth emails. content_path is resolved relative to the
# project root (the dir that holds supabase/). These override GoTrue's plain
# default templates for local dev and on `supabase config push`. The hosted
# project's templates live in the dashboard (Auth → Email Templates) and must
# be kept in sync by hand — see TRANSACTIONAL_EMAIL_SETUP.md.
[auth.email.template.confirmation]
subject = "Confirm your KnockIQ account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your KnockIQ password"
content_path = "./supabase/templates/recovery.html"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

# manage-team does its own in-function authentication check via
# adminClient.auth.getUser(token) + role === 'manager' — so we skip the
# runtime's built-in JWT pre-verifier. The built-in verifier is pinned to
# a djwt version that doesn't support ES256, so when the project uses
# the new asymmetric signing keys it rejects all tokens with
# "Unsupported JWT algorithm ES256" before the function can run.
[functions.manage-team]
verify_jwt = false

# stripe-webhook is called by Stripe's servers, which never send a Supabase
# JWT. It authenticates instead by verifying the Stripe webhook signature
# (STRIPE_WEBHOOK_SECRET). The built-in JWT pre-verifier would 401 every
# event before the function runs, so it must be disabled here.
[functions.stripe-webhook]
verify_jwt = false

# send-welcome and send-closer-onboarding require a signed-in caller and the
# client always sends the user's access token, so the platform JWT pre-verifier
# stays on (matching the deployed manage-team / notify-closer). Each function
# ALSO re-authenticates in-function via adminClient.auth.getUser(token) and
# enforces org-scoped authorization on top of that.
[functions.send-welcome]
verify_jwt = true

[functions.send-closer-onboarding]
verify_jwt = true

# send-growth-welcome emails a new growth rep a set-password link. Caller must
# be a signed-in super-admin (re-checked in-function via users.is_super_admin),
# so the platform pre-verifier stays on.
[functions.send-growth-welcome]
verify_jwt = true

[[analytics]]
enabled = false
