# Supabase project configuration
# Reference: https://supabase.com/docs/guides/local-development/cli/config

[project]
id = "knockiq"   # update to match your actual Supabase project ref

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://canvassing-app-theta.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

# manage-team does its own in-function authentication check via
# adminClient.auth.getUser(token) + role === 'manager' — so we skip the
# runtime's built-in JWT pre-verifier. The built-in verifier is pinned to
# a djwt version that doesn't support ES256, so when the project uses
# the new asymmetric signing keys it rejects all tokens with
# "Unsupported JWT algorithm ES256" before the function can run.
[functions.manage-team]
verify_jwt = false

[[analytics]]
enabled = false
